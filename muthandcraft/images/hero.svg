<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#243039"/>
      <stop offset="1" stop-color="#0f161c"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0 H0 V48" fill="none" stroke="#3a4854" stroke-width="1" opacity="0.4"/>
    </pattern>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>
  <!-- abstract house blueprint -->
  <g stroke="#d97a26" stroke-width="3" fill="none" opacity="0.55">
    <path d="M980 620 L980 360 L1180 220 L1380 360 L1380 620 Z"/>
    <path d="M1080 620 L1080 480 L1180 480 L1180 620"/>
    <rect x="1230" y="430" width="90" height="80"/>
    <line x1="980" y1="360" x2="1180" y2="500"/>
    <line x1="1380" y1="360" x2="1180" y2="500"/>
  </g>
  <g stroke="#5a6b78" stroke-width="2" fill="none" opacity="0.35">
    <circle cx="300" cy="240" r="120"/>
    <line x1="180" y1="240" x2="420" y2="240"/>
    <line x1="300" y1="120" x2="300" y2="360"/>
  </g>
</svg>
