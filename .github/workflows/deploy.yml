name: Deploy to Fly.io

# Deployt Smart Meal automatisch zu Fly, sobald etwas auf main landet.
# Manuell auslösbar über den "Run workflow"-Button (workflow_dispatch).
#
# EINMALIGE Voraussetzung (sicher, Token landet nie im Chat/Repo):
#   1) Lokal einen Deploy-Token erzeugen:  fly tokens create deploy -a smart-meal
#   2) In GitHub: Repo → Settings → Secrets and variables → Actions →
#      "New repository secret" → Name: FLY_API_TOKEN, Wert: <der Token>
# Danach deployt jeder Push auf main automatisch.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy app
    runs-on: ubuntu-latest
    concurrency: deploy-group  # nie zwei Deploys gleichzeitig
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
